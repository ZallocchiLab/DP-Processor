name: Build Portable Release

on:
    release:
        types: [published]

env:
    PYTHON_VERSION: "3.13.2"
    PYTHON_SHORT_VER: "313"

jobs:
    build:
        runs-on: windows-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Create Distribution Directory
              run: New-Item -ItemType Directory -Path "dist"

            - name: Create Version File
              shell: powershell
              run: |
                $rawTag = "${{ github.event.release.tag_name }}"
                $cleanVersion = $rawTag -replace '^v', ''
                [System.IO.File]::WriteAllText("dist/version.txt", $cleanVersion, [System.Text.Encoding]::ASCII)

            - name: Generate Batch File Dynamically
              shell: powershell
              run: |
                  $batContent = @"
                  @echo off
                  setlocal enabledelayedexpansion

                  set "PARENT_DIR=%~dp1"
                  set "OUTPUT_PATH=%PARENT_DIR%DP_Processed_Data\"

                  set "APP_VERSION="
                  if exist "%~dp0\version.txt" (
                      set /p APP_VERSION=<"%~dp0\version.txt"
                  )

                  echo "DP Processor %APP_VERSION%"
                  "%~dp0\python-${{ env.PYTHON_VERSION }}-embed-amd64\python" --version
                  "%~dp0\python-${{ env.PYTHON_VERSION }}-embed-amd64\python" "%~dp0\dp_processor.py" -v

                  echo Output destination: "%OUTPUT_PATH%"
                  "%~dp0\python-${{ env.PYTHON_VERSION }}-embed-amd64\python" "%~dp0\dp_processor.py" -o "%OUTPUT_PATH%" -i "%*"

                  pause
                  "@
                  [System.IO.File]::WriteAllText("dist/dp_processor.bat", $batContent, [System.Text.Encoding]::ASCII)

            - name: Download Python Embeddable Zip
              run: |
                  Invoke-WebRequest -Uri "https://www.python.org/ftp/python/${{ env.PYTHON_VERSION }}/python-${{ env.PYTHON_VERSION }}-embed-amd64.zip" -OutFile "python-embed.zip"
                  Expand-Archive -Path "python-embed.zip" -DestinationPath "dist/python-${{ env.PYTHON_VERSION }}-embed-amd64"

            - name: Copy Python script into distribution folder
              run: Copy-Item "dp_processor.py" -Destination "dist/"

            - name: Install dependencies inside the embedded environment
              run: |
                  # Un-comment the 'import site' line in the ._pth file so pip packages work
                  (Get-Content "dist/python-${{ env.PYTHON_VERSION }}embed-amd64/python${{ env.PYTHON_SHORT_VER }}._pth") -replace '#import site', 'import site' | Set-Content "dist/python-${{ env.PYTHON_VERSION }}-embed-amd64/python${{ env.PYTHON_SHORT_VER }}._pth"

                  # Download and run get-pip
                  Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "get-pip.py"
                  .\dist\python-${{ env.PYTHON_VERSION }}-embed-amd64\python.exe get-pip.py

                  # Install your research requirements
                  .\dist\python-${{ env.PYTHON_VERSION }}-embed-amd64\python.exe -m pip install -r requirements.txt --only-binary=:all:

            - name: Create Release Zip
              run: Compress-Archive -Path "dist/*" -DestinationPath "dp-processor-portable.zip"

            - name: Upload Asset
              uses: softprops/action-gh-release@v2
              with:
                  files: dp-processor-portable.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
